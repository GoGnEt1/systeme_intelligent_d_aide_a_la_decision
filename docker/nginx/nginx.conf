# =============================================================
#  Nginx — Configuration Reverse Proxy SmartShop
#
#  RÔLE du reverse proxy :
#  Le client (browser) envoie toutes ses requêtes sur le port 80.
#  Nginx les redistribue selon l'URL :
#    /         → React frontend
#    /api/*    → Django backend
#    /ml/*     → FastAPI ML service
#    /static/* → fichiers statiques Django
#    /media/*  → fichiers uploadés (images produits)
# =============================================================

# =============================================================
#  Nginx — Configuration SmartShop CORRIGÉE
# =============================================================

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile           on;
    keepalive_timeout  65;
    client_max_body_size 20M;

    server {
        listen 80;
        server_name localhost;

        # ── Static Django (admin CSS + JS) ───────────────────
        location /static/ {
            alias /static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # ── Médias (images produits) ─────────────────────────
        location /media/ {
            alias /media/;
            expires 7d;
            add_header Cache-Control "public";
        }

        # ── Admin Django ─────────────────────────────────────
        location /admin/ {
            proxy_pass         http://django:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # ── API Django ───────────────────────────────────────
        location /api/ {
            proxy_pass         http://django:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # ── FastAPI ML Service ───────────────────────────────
        location /ml/ {
            proxy_pass         http://fastapi:8001/ml/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_read_timeout 60s;
        }

        # ── React Frontend ───────────────────────────────────
        location / {
            proxy_pass         http://frontend:5173;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
        }
    }
}